services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:6.9.4-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/marx-clone:/var/www/html/wp-content/themes/marx-clone

  wpcli:
    image: wordpress:cli
    depends_on:
      - wordpress
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppass
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/marx-clone:/var/www/html/wp-content/themes/marx-clone
    profiles: ["cli"]
    entrypoint: ["wp"]

volumes:
  db_data:
  wp_data:
